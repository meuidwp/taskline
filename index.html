<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TaskLine — Seus hábitos, suas tarefas, mais produtividade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  /* Estilos mantidos do código anterior */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== THEMES ===== */
  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.07);
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf4fc;
    --gold: #fcc25c;
    --green: #5cfca0;
    --text: #f0effe;
    --text2: #9390b0;
    --text3: #5a5875;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --glow: 0 0 40px rgba(124,92,252,0.18);
    --heatmap-0: #1a1a24;
    --heatmap-1: #2d2b55;
    --heatmap-2: #4c3d8c;
    --heatmap-3: #7c5cfc;
    --heatmap-4: #b084ff;
  }

  [data-theme="light"] {
    --bg: #f8f9ff;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --surface3: #e4e7ef;
    --border: rgba(0,0,0,0.08);
    --accent: #6b4eff;
    --accent2: #ff4d6d;
    --accent3: #2dd4bf;
    --gold: #f59e0b;
    --green: #10b981;
    --text: #1e1b2e;
    --text2: #6b6a7a;
    --text3: #9ca3af;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --glow: 0 0 40px rgba(107,78,255,0.1);
    --heatmap-0: #ebedf0;
    --heatmap-1: #d0b7ff;
    --heatmap-2: #a37eff;
    --heatmap-3: #7c5cfc;
    --heatmap-4: #5a3db3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

  /* ===== MOBILE-FIRST LAYOUT ===== */
  .app-shell {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .mobile-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 12px 16px;
    z-index: 200;
    backdrop-filter: blur(10px);
    display: none;
  }

  .mobile-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text2);
    transition: color 0.2s;
    font-size: 12px;
  }

  .mobile-nav-item.active { color: var(--accent); }
  .mobile-nav-icon { font-size: 22px; }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: 150;
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 140;
    display: none;
  }

  .sidebar-overlay.open { display: block; }

  @media (min-width: 768px) {
    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto 1fr;
    }

    .sidebar {
      position: sticky;
      transform: none;
      grid-row: 1 / -1;
      z-index: 1;
    }

    .sidebar-overlay { display: none !important; }
    .menu-toggle { display: none; }
    .mobile-nav { display: none; }
  }

  @media (max-width: 767px) {
    .main { padding-bottom: 80px !important; }
    .mobile-nav { display: flex; }
    .header { padding: 0 20px !important; }
    .main { padding: 20px !important; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
    .two-col { grid-template-columns: 1fr !important; }
  }

  .logo {
    padding: 0 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .logo-content {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin: 0 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    font-size: 14px;
    color: var(--text2);
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: rgba(124,92,252,0.15);
    color: var(--accent);
    font-weight: 500;
  }

  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 20px;
    border-top: 1px solid var(--border);
  }

  .score-widget {
    background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(252,92,125,0.12));
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: 16px;
    padding: 16px;
  }

  .score-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-bar {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.6s;
  }

  .header {
    grid-column: 2;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .menu-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 40px;
    height: 40px;
    display: none;
    place-items: center;
    cursor: pointer;
    font-size: 20px;
  }

  @media (max-width: 767px) {
    .menu-toggle { display: grid; }
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b7cfd);
    color: white;
  }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .btn-secondary:hover {
    background: var(--surface3);
    color: var(--text);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .task-item, .habit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.18s;
  }

  .task-item.done { opacity: 0.5; }
  .task-item.done .task-name { text-decoration: line-through; }

  .task-check {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: grid;
    place-items: center;
    cursor: pointer;
  }

  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
  }

  .task-actions {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .action-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.18s;
    color: var(--text2);
  }

  .action-btn:hover { background: var(--surface3); color: var(--text); }

  /* Sync Status */
  .sync-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text3);
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 10px;
    margin-top: 8px;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  .sync-dot.syncing {
    background: var(--gold);
    animation: pulse 1s infinite;
  }

  .sync-dot.error {
    background: var(--accent2);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Modal de Backup */
  .backup-modal {
    max-width: 500px;
  }

  .backup-code {
    background: var(--surface2);
    padding: 12px;
    border-radius: 10px;
    font-family: monospace;
    font-size: 12px;
    word-break: break-all;
    margin: 12px 0;
  }

  /* Heatmap Table */
  .heatmap-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow-x: auto;
  }

  .heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .heatmap-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }

  .heatmap-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
  }

  .heatmap-stats span {
    color: var(--accent);
    font-weight: 600;
  }

  .heatmap-table {
    border-collapse: collapse;
    width: 100%;
  }

  .heatmap-table th,
  .heatmap-table td {
    padding: 0;
    text-align: center;
    vertical-align: middle;
  }

  .months-row th {
    font-size: 10px;
    font-weight: normal;
    color: var(--text3);
    padding-bottom: 8px;
    text-align: left;
  }

  .weekday-cell {
    font-size: 10px;
    color: var(--text2);
    text-align: right;
    padding-right: 12px;
    white-space: nowrap;
    height: 14px;
  }

  @media (max-width: 768px) {
    .weekday-cell {
      font-size: 8px;
      padding-right: 8px;
      height: 12px;
    }
  }

  .heat-cell {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    background-color: var(--heatmap-0);
    margin: 0 auto;
  }

  @media (max-width: 768px) {
    .heat-cell {
      width: 10px;
      height: 10px;
    }
  }

  .heat-cell:hover {
    transform: scale(1.2);
    box-shadow: 0 0 0 2px var(--accent);
    z-index: 10;
    position: relative;
  }

  .heat-cell.level-0 { background-color: var(--heatmap-0); }
  .heat-cell.level-1 { background-color: var(--heatmap-1); }
  .heat-cell.level-2 { background-color: var(--heatmap-2); }
  .heat-cell.level-3 { background-color: var(--heatmap-3); }
  .heat-cell.level-4 { background-color: var(--heatmap-4); }

  .heatmap-legend {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text2);
  }

  .legend-colors {
    display: flex;
    gap: 3px;
  }

  .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 1000;
    box-shadow: var(--glow);
    max-width: 250px;
    white-space: normal;
    line-height: 1.5;
    font-family: 'DM Sans', sans-serif;
  }

  .tooltip strong {
    color: var(--accent);
    display: block;
    margin-bottom: 6px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: none;
    place-items: center;
    padding: 20px;
  }

  .modal-overlay.open { display: grid; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    width: 500px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    font-family: monospace;
  }

  .form-textarea {
    resize: vertical;
    min-height: 100px;
  }

  .notif {
    position: fixed;
    bottom: 80px;
    right: 20px;
    left: 20px;
    background: var(--surface);
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--glow);
    transform: translateX(120%);
    transition: transform 0.3s;
    z-index: 1000;
    max-width: 400px;
    margin: 0 auto;
  }

  @media (min-width: 768px) {
    .notif { left: auto; bottom: 24px; right: 24px; }
  }

  .notif.show { transform: translateX(0); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }

  .habit-week-grid {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .habit-day {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    background: var(--surface3);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .habit-day.completed {
    background: var(--green);
    color: var(--bg);
  }

  .habit-day.today {
    border: 2px solid var(--accent);
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-content">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Task<span>Line</span></div>
      </div>
      <div class="theme-toggle" onclick="toggleTheme()">🌙</div>
    </div>
    <div class="nav-item active" data-page="dashboard">📊 Dashboard</div>
    <div class="nav-item" data-page="tasks">✓ Tarefas <span class="nav-badge" id="pending-badge">0</span></div>
    <div class="nav-item" data-page="habits">◎ Hábitos</div>
    <div class="nav-item" data-page="calendar">📅 Calendário</div>
    <div class="nav-item" data-page="analytics">📈 Analytics</div>
    <div class="nav-item" data-page="backup">💾 Backup</div>
    <div class="sidebar-footer">
      <div class="score-widget">
        <div style="font-size:11px;color:var(--text2)">SCORE HOJE</div>
        <div class="score-value" id="sidebar-score">0</div>
        <div class="score-bar"><div class="score-bar-fill" id="score-bar-fill"></div></div>
      </div>
      <div class="sync-status" id="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-text">Local</span>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <header class="header">
    <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
    <div class="header-left">
      <div class="header-title" id="header-title">Dashboard</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openTaskModal()">＋ Nova Tarefa</button>
      <button class="btn btn-secondary" onclick="openBackupModal()">💾 Backup</button>
    </div>
  </header>

  <main class="main">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-tasks" class="page" style="display:none"></div>
    <div id="page-habits" class="page" style="display:none"></div>
    <div id="page-calendar" class="page" style="display:none"></div>
    <div id="page-analytics" class="page" style="display:none"></div>
    <div id="page-backup" class="page" style="display:none"></div>
  </main>

  <div class="mobile-nav">
    <div class="mobile-nav-item" data-page="dashboard"><div class="mobile-nav-icon">📊</div><span>Início</span></div>
    <div class="mobile-nav-item" data-page="tasks"><div class="mobile-nav-icon">✓</div><span>Tarefas</span></div>
    <div class="mobile-nav-item" data-page="habits"><div class="mobile-nav-icon">◎</div><span>Hábitos</span></div>
    <div class="mobile-nav-item" data-page="calendar"><div class="mobile-nav-icon">📅</div><span>Calendário</span></div>
    <div class="mobile-nav-item" data-page="analytics"><div class="mobile-nav-icon">📈</div><span>Análise</span></div>
    <div class="mobile-nav-item" data-page="backup"><div class="mobile-nav-icon">💾</div><span>Backup</span></div>
  </div>
</div>

<div class="notif" id="notif"><span id="notif-msg"></span></div>
<div id="tooltip" class="tooltip" style="display:none"></div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3 id="modal-title">✧ Nova Tarefa</h3>
    <div class="form-group"><input type="text" class="form-input" id="task-name" placeholder="Nome da tarefa"></div>
    <div class="form-group">
      <select class="form-select" id="task-cat">
        <option value="work">💼 Trabalho</option>
        <option value="personal">🏠 Pessoal</option>
        <option value="health">💪 Saúde</option>
        <option value="study">📚 Estudo</option>
      </select>
    </div>
    <div class="form-group"><input type="date" class="form-input" id="task-date"></div>
    <div class="form-group">
      <select class="form-select" id="task-weight">
        <option value="low">⬇ Baixo (+1pt)</option>
        <option value="mid">➡ Médio (+3pt)</option>
        <option value="high">⬆ Alto (+5pt)</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeTaskModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<!-- Habit Modal -->
<div class="modal-overlay" id="habit-modal">
  <div class="modal">
    <h3 id="habit-modal-title">✧ Novo Hábito</h3>
    <div class="form-group"><input type="text" class="form-input" id="habit-name" placeholder="Nome do hábito"></div>
    <div class="form-group"><input type="text" class="form-input" id="habit-emoji" placeholder="Emoji (ex: 🧘)" value="◎"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeHabitModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveHabit()">Salvar</button>
    </div>
  </div>
</div>

<!-- Backup Modal -->
<div class="modal-overlay" id="backup-modal">
  <div class="modal backup-modal">
    <h3>💾 Backup e Sincronização</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Salve seus dados ou restaure de um backup anterior</p>
    
    <div class="form-group">
      <label class="form-label">Exportar Dados</label>
      <button class="btn btn-primary" onclick="exportData()" style="width:100%">📤 Exportar para Arquivo</button>
    </div>
    
    <div class="form-group">
      <label class="form-label">Importar Dados</label>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()" style="width:100%">📥 Importar de Arquivo</button>
    </div>
    
    <div class="form-group">
      <label class="form-label">Código de Backup (copie e cole)</label>
      <textarea class="form-textarea" id="backup-code" placeholder="Cole seu código de backup aqui..."></textarea>
      <button class="btn btn-secondary" onclick="exportToClipboard()" style="width:100%;margin-top:8px">📋 Copiar Código</button>
      <button class="btn btn-primary" onclick="importFromClipboard()" style="width:100%;margin-top:8px">📋 Restaurar do Código</button>
    </div>
    
    <div class="form-group">
      <label class="form-label">Resetar Todos os Dados</label>
      <button class="btn" onclick="resetAllData()" style="width:100%;background:var(--accent2);color:white">⚠️ Resetar Tudo</button>
    </div>
    
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeBackupModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
// ===== DATA STORAGE =====
let tasks = [];
let habits = [];
let editingTaskId = null;
let editingHabitId = null;

// ===== FUNÇÕES DE BACKUP =====
function getToday() {
  return new Date().toISOString().split('T')[0];
}

function getAllData() {
  return {
    tasks: tasks,
    habits: habits,
    version: "1.0",
    exportDate: new Date().toISOString()
  };
}

function exportData() {
  const data = getAllData();
  const jsonStr = JSON.stringify(data, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `taskline_backup_${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showNotif('✅ Backup exportado com sucesso!');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tasks && data.habits) {
        tasks = data.tasks;
        habits = data.habits;
        saveToLocalStorage();
        renderAll();
        showNotif('✅ Dados importados com sucesso!');
        closeBackupModal();
      } else {
        throw new Error('Formato inválido');
      }
    } catch (error) {
      showNotif('❌ Arquivo inválido!');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportToClipboard() {
  const data = getAllData();
  const jsonStr = JSON.stringify(data);
  navigator.clipboard.writeText(jsonStr).then(() => {
    showNotif('✅ Código copiado para área de transferência!');
  }).catch(() => {
    showNotif('❌ Não foi possível copiar');
  });
}

function importFromClipboard() {
  const code = document.getElementById('backup-code').value.trim();
  if (!code) {
    showNotif('❌ Cole um código de backup primeiro!');
    return;
  }
  
  try {
    const data = JSON.parse(code);
    if (data.tasks && data.habits) {
      tasks = data.tasks;
      habits = data.habits;
      saveToLocalStorage();
      renderAll();
      showNotif('✅ Dados restaurados com sucesso!');
      closeBackupModal();
    } else {
      throw new Error('Formato inválido');
    }
  } catch (error) {
    showNotif('❌ Código inválido!');
  }
}

function resetAllData() {
  if (confirm('⚠️ ATENÇÃO: Isso irá apagar TODOS os seus dados! Tem certeza?')) {
    tasks = [];
    habits = [];
    saveToLocalStorage();
    loadData(); // Recarrega dados padrão
    renderAll();
    showNotif('🗑️ Todos os dados foram resetados!');
    closeBackupModal();
  }
}

function openBackupModal() {
  document.getElementById('backup-modal').classList.add('open');
  document.getElementById('backup-code').value = '';
}

function closeBackupModal() {
  document.getElementById('backup-modal').classList.remove('open');
}

function getWeekDates() {
  const today = new Date();
  const week = [];
  const currentDay = today.getDay();
  const daysToMonday = currentDay === 0 ? 6 : currentDay - 1;
  const monday = new Date(today);
  monday.setDate(today.getDate() - daysToMonday);
  for (let i = 0; i < 7; i++) {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    week.push(date.toISOString().split('T')[0]);
  }
  return week;
}

function getWeekdayNames() {
  return ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
}

function loadData() {
  const savedTasks = localStorage.getItem('taskline_tasks');
  const savedHabits = localStorage.getItem('taskline_habits');
  
  if (savedTasks) tasks = JSON.parse(savedTasks);
  else {
    tasks = [
      { id: 1, name: 'Finalizar relatório', category: 'work', weight: 'high', completed: false, date: getToday() },
      { id: 2, name: 'Academia', category: 'health', weight: 'mid', completed: false, date: getToday() },
      { id: 3, name: 'Ler 30 páginas', category: 'study', weight: 'low', completed: false, date: getToday() }
    ];
  }
  
  if (savedHabits) habits = JSON.parse(savedHabits);
  else {
    habits = [
      { id: 1, name: 'Meditação', emoji: '🧘', history: {} },
      { id: 2, name: 'Exercício', emoji: '💪', history: {} },
      { id: 3, name: 'Leitura', emoji: '📚', history: {} }
    ];
  }
  
  // Initialize empty history for all days of 2026
  const currentYear = 2026;
  const startDate = new Date(currentYear, 0, 1);
  const endDate = new Date(currentYear, 11, 31);
  
  for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
    const dateStr = d.toISOString().split('T')[0];
    habits.forEach(habit => {
      if (habit.history[dateStr] === undefined) {
        habit.history[dateStr] = false;
      }
    });
  }
}

function saveToLocalStorage() {
  localStorage.setItem('taskline_tasks', JSON.stringify(tasks));
  localStorage.setItem('taskline_habits', JSON.stringify(habits));
  updateSyncStatus('local');
}

function updateSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  
  if (status === 'syncing') {
    dot.className = 'sync-dot syncing';
    text.textContent = 'Sincronizando...';
  } else if (status === 'error') {
    dot.className = 'sync-dot error';
    text.textContent = 'Erro na sincronização';
  } else {
    dot.className = 'sync-dot';
    text.textContent = 'Local';
  }
}

// ===== CRUD Operations =====
function addTask(task) {
  tasks.unshift({ ...task, id: Date.now(), completed: false });
  saveToLocalStorage();
  renderAll();
  showNotif(`✓ "${task.name}" adicionada!`);
}

function updateTask(id, updates) {
  const index = tasks.findIndex(t => t.id === id);
  if (index !== -1) {
    tasks[index] = { ...tasks[index], ...updates };
    saveToLocalStorage();
    renderAll();
    showNotif(`✎ Tarefa atualizada!`);
  }
}

function deleteTask(id) {
  if (confirm('Remover esta tarefa?')) {
    tasks = tasks.filter(t => t.id !== id);
    saveToLocalStorage();
    renderAll();
    showNotif(`🗑 Tarefa removida!`);
  }
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.completed = !task.completed;
    saveToLocalStorage();
    renderAll();
    showNotif(task.completed ? `✅ "${task.name}" concluída! +${task.weight === 'high' ? 5 : task.weight === 'mid' ? 3 : 1} pontos!` : `↩ Tarefa reaberta`);
  }
}

function addHabit(habit) {
  const newHabit = { ...habit, id: Date.now(), history: {} };
  const currentYear = 2026;
  const startDate = new Date(currentYear, 0, 1);
  const endDate = new Date(currentYear, 11, 31);
  
  for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
    const dateStr = d.toISOString().split('T')[0];
    newHabit.history[dateStr] = false;
  }
  habits.push(newHabit);
  saveToLocalStorage();
  renderAll();
  showNotif(`🌱 "${habit.name}" adicionado!`);
}

function updateHabit(id, updates) {
  const index = habits.findIndex(h => h.id === id);
  if (index !== -1) {
    habits[index] = { ...habits[index], ...updates };
    saveToLocalStorage();
    renderAll();
    showNotif(`✎ Hábito atualizado!`);
  }
}

function deleteHabit(id) {
  if (confirm('Remover este hábito?')) {
    habits = habits.filter(h => h.id !== id);
    saveToLocalStorage();
    renderAll();
    showNotif(`🗑 Hábito removido!`);
  }
}

function toggleHabitToday(id) {
  const habit = habits.find(h => h.id === id);
  if (habit) {
    const today = getToday();
    habit.history[today] = !habit.history[today];
    saveToLocalStorage();
    renderAll();
    showNotif(habit.history[today] ? `${habit.emoji} "${habit.name}" — concluído! +8 pontos!` : `↩ Hábito desmarcado`);
  }
}

function toggleHabitDay(id, dateStr) {
  const habit = habits.find(h => h.id === id);
  if (habit) {
    habit.history[dateStr] = !habit.history[dateStr];
    saveToLocalStorage();
    renderAll();
    showNotif(habit.history[dateStr] ? `${habit.emoji} "${habit.name}" — concluído!` : `↩ Hábito desmarcado`);
  }
}

// ===== HEATMAP FUNCTIONS =====
function getActivityScore(dateStr) {
  const tasksCompleted = tasks.filter(t => t.date === dateStr && t.completed).length;
  const habitsCompleted = habits.filter(h => h.history[dateStr]).length;
  const totalHabits = habits.length;
  
  const totalActivity = tasksCompleted + habitsCompleted;
  const maxPossible = 5 + totalHabits;
  const percentage = maxPossible > 0 ? totalActivity / maxPossible : 0;
  
  if (percentage === 0) return 0;
  if (percentage <= 0.25) return 1;
  if (percentage <= 0.5) return 2;
  if (percentage <= 0.75) return 3;
  return 4;
}

function renderHeatmap() {
  const currentYear = 2026;
  
  const firstDate = new Date(currentYear, 0, 1);
  while (firstDate.getDay() !== 0) {
    firstDate.setDate(firstDate.getDate() - 1);
  }
  
  const lastDate = new Date(currentYear, 11, 31);
  while (lastDate.getDay() !== 6) {
    lastDate.setDate(lastDate.getDate() + 1);
  }
  
  const weeks = [];
  let currentDate = new Date(firstDate);
  
  while (currentDate <= lastDate) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      week.push(new Date(currentDate));
      currentDate.setDate(currentDate.getDate() + 1);
    }
    weeks.push(week);
  }
  
  const monthNames = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
  const monthNamesLong = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
  const weekdaysLong = ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
  
  const monthSpans = [];
  let lastMonth = -1;
  let monthStartWeek = 0;
  
  for (let weekIdx = 0; weekIdx < weeks.length; weekIdx++) {
    const week = weeks[weekIdx];
    for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
      const date = week[dayIdx];
      if (date.getFullYear() === currentYear) {
        const month = date.getMonth();
        if (month !== lastMonth) {
          if (lastMonth !== -1) {
            monthSpans.push({ month: lastMonth, start: monthStartWeek, end: weekIdx });
          }
          monthStartWeek = weekIdx;
          lastMonth = month;
        }
        break;
      }
    }
  }
  if (lastMonth !== -1) {
    monthSpans.push({ month: lastMonth, start: monthStartWeek, end: weeks.length });
  }
  
  let totalActiveDays = 0;
  let totalScore = 0;
  let totalDays = 0;
  
  weeks.forEach(week => {
    week.forEach(date => {
      if (date.getFullYear() === currentYear) {
        const dateStr = date.toISOString().split('T')[0];
        const score = getActivityScore(dateStr);
        totalScore += score;
        totalDays++;
        if (score > 0) totalActiveDays++;
      }
    });
  });
  
  const avgScore = totalDays > 0 ? (totalScore / totalDays).toFixed(1) : '0';
  const longestStreak = calculateLongestStreak(currentYear);
  
  const weekdayLabels = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  
  let tableHTML = `
    <div class="heatmap-container">
      <div class="heatmap-header">
        <div>
          <div class="heatmap-title">📅 ${currentYear} — Calendário de Contribuições</div>
        </div>
        <div class="heatmap-stats">
          <div>✨ <span>${totalActiveDays}</span> dias ativos</div>
          <div>📊 <span>${avgScore}</span> média</div>
          <div>🔥 <span>${longestStreak}</span> maior streak</div>
        </div>
      </div>
      
      <table class="heatmap-table" cellspacing="0" cellpadding="0">
        <tr class="months-row">
          <th style="width: 50px;"></th>
          ${monthSpans.map(span => `
            <th colspan="${span.end - span.start}" style="text-align: left; padding-left: 0;">${monthNames[span.month]}</th>
          `).join('')}
        </tr>
  `;
  
  for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
    tableHTML += `<tr>`;
    tableHTML += `<td class="weekday-cell">${weekdayLabels[dayIdx]}</td>`;
    
    for (let weekIdx = 0; weekIdx < weeks.length; weekIdx++) {
      const date = weeks[weekIdx][dayIdx];
      const isCurrentYear = date.getFullYear() === currentYear;
      const dateStr = date.toISOString().split('T')[0];
      
      if (isCurrentYear) {
        const score = getActivityScore(dateStr);
        const isToday = dateStr === getToday();
        const tasksCompleted = tasks.filter(t => t.date === dateStr && t.completed).length;
        const habitsCompleted = habits.filter(h => h.history[dateStr]).length;
        
        const weekdayName = weekdaysLong[date.getDay()];
        const formattedDate = `${weekdayName}, ${date.getDate()} de ${monthNamesLong[date.getMonth()]} de ${date.getFullYear()}`;
        
        tableHTML += `<td style="padding: 0;">
          <div class="heat-cell level-${score}" 
               data-date="${dateStr}"
               data-tasks="${tasksCompleted}"
               data-habits="${habitsCompleted}"
               data-formatted="${formattedDate}"
               onmouseenter="showTooltip(event, '${formattedDate}', ${tasksCompleted}, ${habitsCompleted})"
               onmouseleave="hideTooltip()"
               style="${isToday ? 'border: 1px solid var(--accent);' : ''}"></div>
        </td>`;
      } else {
        tableHTML += `<td style="padding: 0;"><div class="heat-cell" style="opacity:0.2; cursor:default;"></div></td>`;
      }
    }
    tableHTML += `</tr>`;
  }
  
  tableHTML += `
      </table>
      
      <div class="heatmap-legend">
        <span>Menos</span>
        <div class="legend-colors">
          <div class="legend-color" style="background: var(--heatmap-0)"></div>
          <div class="legend-color" style="background: var(--heatmap-1)"></div>
          <div class="legend-color" style="background: var(--heatmap-2)"></div>
          <div class="legend-color" style="background: var(--heatmap-3)"></div>
          <div class="legend-color" style="background: var(--heatmap-4)"></div>
        </div>
        <span>Mais</span>
      </div>
    </div>
  `;
  
  return tableHTML;
}

function calculateLongestStreak(year) {
  let longest = 0;
  let current = 0;
  const startDate = new Date(year, 0, 1);
  const endDate = new Date(year, 11, 31);
  let date = new Date(startDate);
  
  while (date <= endDate) {
    const dateStr = date.toISOString().split('T')[0];
    const score = getActivityScore(dateStr);
    if (score > 0) {
      current++;
      if (current > longest) longest = current;
    } else {
      current = 0;
    }
    date.setDate(date.getDate() + 1);
  }
  return longest;
}

// Tooltip functions
function showTooltip(event, formattedDate, tasksCompleted, habitsCompleted) {
  const tooltip = document.getElementById('tooltip');
  if (!tooltip) return;
  
  let tasksText = tasksCompleted === 0 ? '📋 Nenhuma tarefa concluída' : `📋 ${tasksCompleted} tarefa${tasksCompleted !== 1 ? 's' : ''} concluída${tasksCompleted !== 1 ? 's' : ''}`;
  let habitsText = habitsCompleted === 0 ? '◎ Nenhum hábito concluído' : `◎ ${habitsCompleted} hábito${habitsCompleted !== 1 ? 's' : ''} concluído${habitsCompleted !== 1 ? 's' : ''}`;
  
  tooltip.innerHTML = `<strong>${formattedDate}</strong>${tasksText}<br>${habitsText}`;
  tooltip.style.display = 'block';
  
  let left = event.pageX + 12;
  let top = event.pageY - 30;
  
  if (left + 250 > window.innerWidth) {
    left = event.pageX - 260;
  }
  if (top < 0) {
    top = event.pageY + 20;
  }
  if (top + 100 > window.innerHeight) {
    top = event.pageY - 80;
  }
  
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() {
  const tooltip = document.getElementById('tooltip');
  if (tooltip) tooltip.style.display = 'none';
}

// ===== Render Functions =====
function renderDashboard() {
  const today = getToday();
  const todayTasks = tasks.filter(t => t.date === today);
  const completedToday = todayTasks.filter(t => t.completed).length;
  const completedHabitsToday = habits.filter(h => h.history[today]).length;
  
  const totalScore = Math.min(100, 
    tasks.filter(t => t.completed && t.date === today).reduce((sum, t) => 
      sum + (t.weight === 'high' ? 5 : t.weight === 'mid' ? 3 : 1), 0) * 10 +
    completedHabitsToday * 8
  );
  
  document.getElementById('sidebar-score').textContent = totalScore;
  document.getElementById('score-bar-fill').style.width = totalScore + '%';
  document.getElementById('pending-badge').textContent = tasks.filter(t => !t.completed).length;
  
  const totalStreak = Math.max(...habits.map(h => {
    let streak = 0;
    let date = new Date();
    while (true) {
      const dateStr = date.toISOString().split('T')[0];
      if (h.history[dateStr]) streak++;
      else break;
      date.setDate(date.getDate() - 1);
    }
    return streak;
  }), 0);
  
  const heatmapHTML = renderHeatmap();
  
  const html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${totalScore}</div><div>Score do Dia</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--green)">${completedToday}</div><div>Tarefas Hoje</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--accent3)">${completedHabitsToday}/${habits.length}</div><div>Hábitos Hoje</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--gold)">${totalStreak}</div><div>Streak Atual</div></div>
    </div>
    ${heatmapHTML}
    <div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">
      <div>
        <div class="card">
          <h3 style="margin-bottom:16px">📋 Tarefas de Hoje</h3>
          ${todayTasks.length ? todayTasks.map(t => `
            <div class="task-item ${t.completed ? 'done' : ''}">
              <div class="task-check" onclick="toggleTask(${t.id})">${t.completed ? '✓' : ''}</div>
              <div class="task-name">${t.name}</div>
              <div class="task-actions">
                <button class="action-btn" onclick="event.stopPropagation();editTask(${t.id})">✎</button>
                <button class="action-btn" onclick="event.stopPropagation();deleteTask(${t.id})">🗑</button>
              </div>
            </div>
          `).join('') : '<div class="empty-state">✨ Nenhuma tarefa para hoje</div>'}
        </div>
      </div>
      <div>
        <div class="card">
          <h3 style="margin-bottom:16px">◎ Hábitos de Hoje</h3>
          ${habits.length ? habits.map(h => {
            const isCompleted = h.history[today];
            return `
              <div class="habit-item" onclick="toggleHabitToday(${h.id})">
                <div style="font-size:24px">${h.emoji}</div>
                <div style="flex:1">
                  <div>${h.name}</div>
                  <div style="font-size:11px;color:var(--text2)">${isCompleted ? '✅ Concluído hoje' : '⭕ Pendente'}</div>
                </div>
                <button class="action-btn" onclick="event.stopPropagation();editHabit(${h.id})">✎</button>
              </div>
            `;
          }).join('') : '<div class="empty-state">🌟 Adicione seus primeiros hábitos</div>'}
        </div>
      </div>
    </div>
  `;
  document.getElementById('page-dashboard').innerHTML = html;
}

function renderTasksPage() {
  const html = `
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <select id="task-filter" class="form-select" style="width:auto" onchange="renderTasksPage()">
        <option value="all">Todas</option>
        <option value="pending">Pendentes</option>
        <option value="completed">Concluídas</option>
        <option value="high">Alta prioridade</option>
      </select>
      <button class="btn btn-primary" onclick="openTaskModal()">+ Nova Tarefa</button>
    </div>
    <div class="card">
      ${tasks.map(t => `
        <div class="task-item ${t.completed ? 'done' : ''}">
          <div class="task-check" onclick="toggleTask(${t.id})">${t.completed ? '✓' : ''}</div>
          <div>
            <div class="task-name">${t.name}</div>
            <div style="font-size:11px;color:var(--text3)">📅 ${t.date} | ${t.weight === 'high' ? '🔥 Alta' : t.weight === 'mid' ? '⚡ Média' : '✨ Baixa'}</div>
          </div>
          <div class="task-actions">
            <button class="action-btn" onclick="event.stopPropagation();editTask(${t.id})">✎</button>
            <button class="action-btn" onclick="event.stopPropagation();deleteTask(${t.id})">🗑</button>
          </div>
        </div>
      `).join('') || '<div class="empty-state">📭 Nenhuma tarefa encontrada</div>'}
    </div>
  `;
  document.getElementById('page-tasks').innerHTML = html;
}

function renderHabitsPage() {
  const weekDates = getWeekDates();
  const weekdays = getWeekdayNames();
  const today = getToday();
  
  const html = `
    <div style="display:flex;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <h2>Meus Hábitos</h2>
      <button class="btn btn-primary" onclick="openHabitModal()">+ Novo Hábito</button>
    </div>
    <div class="habits-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
      ${habits.map(h => {
        let streak = 0;
        let date = new Date();
        while (true) {
          const dateStr = date.toISOString().split('T')[0];
          if (h.history[dateStr]) streak++;
          else break;
          date.setDate(date.getDate() - 1);
        }
        
        return `
          <div class="card">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px">
              <span style="font-size:32px">${h.emoji}</span>
              <span style="color:var(--gold)">🔥 ${streak} dias</span>
            </div>
            <h3>${h.name}</h3>
            <div class="habit-week-grid">
              ${weekDates.map((date, idx) => {
                const isToday = date === today;
                const isCompleted = h.history[date];
                const dayName = weekdays[idx].substring(0, 3);
                return `
                  <div class="habit-day ${isCompleted ? 'completed' : ''} ${isToday ? 'today' : ''}" 
                       onclick="event.stopPropagation();toggleHabitDay(${h.id}, '${date}')">
                    ${dayName}<br>
                    ${isCompleted ? '✓' : '○'}
                  </div>
                `;
              }).join('')}
            </div>
            <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
              <button class="action-btn" onclick="editHabit(${h.id})">✎ Editar</button>
              <button class="action-btn" onclick="deleteHabit(${h.id})">🗑 Remover</button>
            </div>
          </div>
        `;
      }).join('') || '<div class="empty-state">🌟 Comece adicionando seu primeiro hábito</div>'}
    </div>
  `;
  document.getElementById('page-habits').innerHTML = html;
}

function renderCalendar() {
  const today = getToday();
  const daysInMonth = new Date().getDate();
  const currentMonth = new Date().getMonth();
  const currentYear = new Date().getFullYear();
  
  const html = `
    <div class="card">
      <h3>📅 ${new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}</h3>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px">
        ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => `<div style="text-align:center;font-size:12px;color:var(--text3)">${d}</div>`).join('')}
        ${Array.from({ length: daysInMonth }, (_, i) => {
          const date = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
          const dayTasks = tasks.filter(t => t.date === date);
          const completedHabits = habits.filter(h => h.history[date]).length;
          const isToday = date === today;
          return `<div class="cal-day" style="aspect-ratio:1;background:${isToday ? 'var(--accent)' : 'var(--surface2)'};border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-direction:column;gap:4px" onclick="showDayTasks('${date}')">
            ${i + 1}
            ${dayTasks.length ? `<div style="font-size:9px">📋${dayTasks.length}</div>` : ''}
            ${completedHabits > 0 ? `<div style="font-size:9px;color:var(--green)">✓${completedHabits}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card" id="day-detail"><div class="empty-state">Selecione um dia para ver as tarefas</div></div>
  `;
  document.getElementById('page-calendar').innerHTML = html;
}

function showDayTasks(date) {
  const dayTasks = tasks.filter(t => t.date === date);
  const completedHabits = habits.filter(h => h.history[date]);
  const html = `
    <h3>📋 ${date}</h3>
    <div style="margin-bottom:16px">
      <strong>✓ Hábitos concluídos:</strong> ${completedHabits.length}/${habits.length}
    </div>
    ${dayTasks.map(t => `
      <div class="task-item ${t.completed ? 'done' : ''}">
        <div class="task-check" onclick="toggleTask(${t.id})">${t.completed ? '✓' : ''}</div>
        <div class="task-name">${t.name}</div>
      </div>
    `).join('') || '<div class="empty-state">Nenhuma tarefa neste dia</div>'}
  `;
  document.getElementById('day-detail').innerHTML = html;
}

function renderAnalytics() {
  const completedTasks = tasks.filter(t => t.completed).length;
  const totalTasks = tasks.length;
  const completionRate = totalTasks ? Math.round(completedTasks / totalTasks * 100) : 0;
  
  const today = getToday();
  const completedToday = habits.filter(h => h.history[today]).length;
  const habitRate = habits.length ? Math.round(completedToday / habits.length * 100) : 0;
  
  const totalStreak = Math.max(...habits.map(h => {
    let streak = 0;
    let date = new Date();
    while (true) {
      const dateStr = date.toISOString().split('T')[0];
      if (h.history[dateStr]) streak++;
      else break;
      date.setDate(date.getDate() - 1);
    }
    return streak;
  }), 0);
  
  const longestStreak = calculateLongestStreak(2026);
  
  const html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" style="color:var(--green)">${completionRate}%</div><div>Taxa de Conclusão</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${habitRate}%</div><div>Hábitos Hoje</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--gold)">${totalStreak}</div><div>Streak Atual</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--accent3)">${longestStreak}</div><div>Maior Streak</div></div>
    </div>
    <div class="card">
      <h3>📊 Distribuição por Categoria</h3>
      ${['work', 'personal', 'health', 'study'].map(cat => {
        const catTasks = tasks.filter(t => t.category === cat);
        const completed = catTasks.filter(t => t.completed).length;
        const pct = catTasks.length ? Math.round(completed / catTasks.length * 100) : 0;
        const icon = cat === 'work' ? '💼' : cat === 'personal' ? '🏠' : cat === 'health' ? '💪' : '📚';
        return `<div style="margin-bottom:12px">
          <div>${icon} ${cat === 'work' ? 'Trabalho' : cat === 'personal' ? 'Pessoal' : cat === 'health' ? 'Saúde' : 'Estudo'}</div>
          <div style="height:8px;background:var(--surface3);border-radius:4px;margin-top:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.3s"></div>
          </div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">${completed}/${catTasks.length} concluídas</div>
        </div>`;
      }).join('')}
    </div>
  `;
  document.getElementById('page-analytics').innerHTML = html;
}

function renderBackupPage() {
  const html = `
    <div class="card">
      <h3>💾 Backup e Sincronização</h3>
      <p style="margin-bottom:16px;color:var(--text2)">Seus dados são salvos automaticamente no seu navegador. Use as opções abaixo para exportar ou restaurar seus dados.</p>
      
      <div class="form-group">
        <label class="form-label">Exportar Dados</label>
        <button class="btn btn-primary" onclick="exportData()" style="width:100%">📤 Exportar para Arquivo</button>
      </div>
      
      <div class="form-group">
        <label class="form-label">Importar Dados</label>
        <input type="file" id="import-file-page" accept=".json" style="display:none" onchange="importDataFromPage(this)">
        <button class="btn btn-secondary" onclick="document.getElementById('import-file-page').click()" style="width:100%">📥 Importar de Arquivo</button>
      </div>
      
      <div class="form-group">
        <label class="form-label">Código de Backup</label>
        <textarea class="form-textarea" id="backup-code-page" placeholder="Cole seu código de backup aqui..."></textarea>
        <button class="btn btn-secondary" onclick="exportToClipboardPage()" style="width:100%;margin-top:8px">📋 Copiar Código</button>
        <button class="btn btn-primary" onclick="importFromClipboardPage()" style="width:100%;margin-top:8px">📋 Restaurar do Código</button>
      </div>
      
      <div class="form-group">
        <label class="form-label">Resetar Todos os Dados</label>
        <button class="btn" onclick="resetAllDataFromPage()" style="width:100%;background:var(--accent2);color:white">⚠️ Resetar Tudo</button>
      </div>
      
      <div class="sync-status" style="margin-top:16px;justify-content:center">
        <div class="sync-dot" id="sync-dot-page"></div>
        <span id="sync-text-page">Local</span>
      </div>
    </div>
  `;
  document.getElementById('page-backup').innerHTML = html;
  updateSyncStatusDisplay();
}

function updateSyncStatusDisplay() {
  const dot = document.getElementById('sync-dot-page');
  const text = document.getElementById('sync-text-page');
  if (dot && text) {
    dot.className = 'sync-dot';
    text.textContent = 'Local';
  }
}

function importDataFromPage(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tasks && data.habits) {
        tasks = data.tasks;
        habits = data.habits;
        saveToLocalStorage();
        renderAll();
        showNotif('✅ Dados importados com sucesso!');
        navigate('dashboard');
      } else {
        throw new Error('Formato inválido');
      }
    } catch (error) {
      showNotif('❌ Arquivo inválido!');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportToClipboardPage() {
  const data = getAllData();
  const jsonStr = JSON.stringify(data);
  navigator.clipboard.writeText(jsonStr).then(() => {
    showNotif('✅ Código copiado para área de transferência!');
  }).catch(() => {
    showNotif('❌ Não foi possível copiar');
  });
}

function importFromClipboardPage() {
  const code = document.getElementById('backup-code-page').value.trim();
  if (!code) {
    showNotif('❌ Cole um código de backup primeiro!');
    return;
  }
  
  try {
    const data = JSON.parse(code);
    if (data.tasks && data.habits) {
      tasks = data.tasks;
      habits = data.habits;
      saveToLocalStorage();
      renderAll();
      showNotif('✅ Dados restaurados com sucesso!');
      navigate('dashboard');
    } else {
      throw new Error('Formato inválido');
    }
  } catch (error) {
    showNotif('❌ Código inválido!');
  }
}

function resetAllDataFromPage() {
  if (confirm('⚠️ ATENÇÃO: Isso irá apagar TODOS os seus dados! Tem certeza?')) {
    tasks = [];
    habits = [];
    saveToLocalStorage();
    loadData();
    renderAll();
    showNotif('🗑️ Todos os dados foram resetados!');
    navigate('dashboard');
  }
}

function renderAll() {
  renderDashboard();
  renderTasksPage();
  renderHabitsPage();
  renderCalendar();
  renderAnalytics();
  renderBackupPage();
}

// ===== Modal Functions =====
function openTaskModal(taskId = null) {
  editingTaskId = taskId;
  const modal = document.getElementById('task-modal');
  document.getElementById('task-date').value = getToday();
  
  if (taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (task) {
      document.getElementById('modal-title').textContent = '✎ Editar Tarefa';
      document.getElementById('task-name').value = task.name;
      document.getElementById('task-cat').value = task.category;
      document.getElementById('task-date').value = task.date;
      document.getElementById('task-weight').value = task.weight;
    }
  } else {
    document.getElementById('modal-title').textContent = '✧ Nova Tarefa';
    document.getElementById('task-name').value = '';
    document.getElementById('task-cat').value = 'work';
    document.getElementById('task-weight').value = 'mid';
  }
  modal.classList.add('open');
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.remove('open');
  editingTaskId = null;
}

function saveTask() {
  const name = document.getElementById('task-name').value.trim();
  if (!name) return showNotif('Por favor, insira um nome para a tarefa');
  
  const taskData = {
    name,
    category: document.getElementById('task-cat').value,
    date: document.getElementById('task-date').value,
    weight: document.getElementById('task-weight').value
  };
  
  if (editingTaskId) updateTask(editingTaskId, taskData);
  else addTask(taskData);
  
  closeTaskModal();
}

function openHabitModal(habitId = null) {
  editingHabitId = habitId;
  const modal = document.getElementById('habit-modal');
  
  if (habitId) {
    const habit = habits.find(h => h.id === habitId);
    if (habit) {
      document.getElementById('habit-modal-title').textContent = '✎ Editar Hábito';
      document.getElementById('habit-name').value = habit.name;
      document.getElementById('habit-emoji').value = habit.emoji;
    }
  } else {
    document.getElementById('habit-modal-title').textContent = '✧ Novo Hábito';
    document.getElementById('habit-name').value = '';
    document.getElementById('habit-emoji').value = '◎';
  }
  modal.classList.add('open');
}

function closeHabitModal() {
  document.getElementById('habit-modal').classList.remove('open');
  editingHabitId = null;
}

function saveHabit() {
  const name = document.getElementById('habit-name').value.trim();
  if (!name) return showNotif('Por favor, insira um nome para o hábito');
  
  const habitData = {
    name,
    emoji: document.getElementById('habit-emoji').value || '◎'
  };
  
  if (editingHabitId) updateHabit(editingHabitId, habitData);
  else addHabit(habitData);
  
  closeHabitModal();
}

function editTask(id) {
  openTaskModal(id);
}

function editHabit(id) {
  openHabitModal(id);
}

// ===== Navigation =====
let currentPage = 'dashboard';

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(`page-${page}`).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll(`.nav-item[data-page="${page}"]`).forEach(n => n.classList.add('active'));
  document.querySelectorAll('.mobile-nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll(`.mobile-nav-item[data-page="${page}"]`).forEach(n => n.classList.add('active'));
  
  const titles = {
    dashboard: 'Dashboard',
    tasks: 'Tarefas',
    habits: 'Hábitos',
    calendar: 'Calendário',
    analytics: 'Analytics',
    backup: 'Backup'
  };
  document.getElementById('header-title').textContent = titles[page] || page;
  closeSidebar();
}

// ===== UI Helpers =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('taskline_theme', newTheme);
  const themeToggle = document.querySelector('.theme-toggle');
  if (themeToggle) themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
}

function showNotif(msg) {
  const notif = document.getElementById('notif');
  if (!notif) return;
  const msgSpan = document.getElementById('notif-msg');
  if (msgSpan) msgSpan.textContent = msg;
  notif.classList.add('show');
  setTimeout(() => notif.classList.remove('show'), 2500);
}

// ===== Initialize =====
function init() {
  const savedTheme = localStorage.getItem('taskline_theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  const themeToggle = document.querySelector('.theme-toggle');
  if (themeToggle) themeToggle.textContent = savedTheme === 'light' ? '🌙' : '☀️';
  
  loadData();
  renderAll();
  navigate('dashboard');
  
  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.page));
  });
  document.querySelectorAll('.mobile-nav-item').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.page));
  });
  
  const headerDate = document.getElementById('header-date');
  if (headerDate) {
    headerDate.textContent = new Date().toLocaleDateString('pt-BR', { 
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
    });
  }
}
